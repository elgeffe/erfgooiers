name: CI

# Every pull request (and push to a PR branch) must typecheck, build and pass
# the test suite before it can merge — deploy.yml only builds after merge, so
# without this a broken PR merges green and breaks the deploy.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Tests
        run: npm test
